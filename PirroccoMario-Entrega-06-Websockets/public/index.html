<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>High-Fidelity Records</title>


  <link rel="stylesheet" href="./css/styles.css" />

</head>

<body>
  <h1 class="homeTitle">High-Fidelity Records</h1>
  <div class="container formContainer">
    <form class="form-records">
      <input type="text" id="artist" name="artist" placeholder="Artist" required />
      <input type="text" id="title" name="title" placeholder="Record Title" required />
      <input type="number" id="price" name="price" placeholder="Price" required />
      <input type="text" id="thumbnail" name="thumbnail" placeholder="Image URL" required />
      <input class="buttonSubmit" type="submit" value="Enviar" />
    </form>
  </div>

  <div class="container recordsContainer">
    <div class="noProducts">
      <h3>Our records catalogue is empty at the moment.</h3>
    </div>

    <div class="yesProducts">
      <h3 class="listTitle">Available records</h3>

      <table class="table tableContainer">

        <thead>
          <tr>
            <th>Artist</th>
            <th>Record</th>
            <th>Price</th>
            <th>Cover</th>
          </tr>
        </thead>
        <tbody class="productsPool"></tbody>
      </table>
    </div>
  </div>
  <hr />
  <!-- CHAT -->
  <div class="container chatContainer">
    <form class="form-messages">

      <input id="userEmail" required placeholder="Email" type="email" name="email" />



      <textarea id="userMessage" required placeholder="Message" type="text" name="message" /></textarea>

      <input class="buttonSubmit" type="submit" value="Enviar" />
    </form>
    <h3 class="messagesTitle">Messages</h3>
    <div class="messagesPool"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>

  <script src="/socket.io/socket.io.js"></script>
  <script src="./client-socket.js"></script>
</body>

</html>
