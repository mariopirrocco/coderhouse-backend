<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>High-Fidelity Records</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>
  <main class="wrapper">
    <h1 class="">High-Fidelity Records</h1>
    <div class="container formContainer">
      <h3>Add new record</h3>
      <form class="form-records">
        <input type="text" id="artist" name="artist" placeholder="Artist" required />
        <input type="text" id="title" name="title" placeholder="Record Title" required />
        <input type="number" id="price" name="price" placeholder="Price" required />
        <input type="text" id="thumbnail" name="thumbnail" placeholder="Image URL" required />
        <input class="btn-link" type="submit" value="Send" />
      </form>
    </div>

    <div class="container recordsContainer">
      <div class="no-records">
        <h3>Our records catalogue is empty at the moment.</h3>
      </div>
      <div class="loaded-records">
        <h3 class="listTitle">Available records</h3>
        <table class="table tableContainer">
          <thead>
            <tr>
              <th>Artist</th>
              <th>Record</th>
              <th>Price</th>
              <th>Cover</th>
            </tr>
          </thead>
          <tbody class="records-catalogue"></tbody>
        </table>
      </div>
    </div>
    <hr />
    <!-- CHAT -->
    <div class="container">
      <h3>Chat with us</h3>
      <form class="form-messages">
        <input type="email" id="user-email" name="email" placeholder="Email" required />
        <textarea id="user-message" name="message" placeholder="Message" required></textarea>
        <input class="btn-link" type="submit" value="Send" />
      </form>
      <h3 class="messagesTitle">Messages</h3>
      <div id="rendered-messages"></div>
    </div>
  </main>


  <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>

  <script src="/socket.io/socket.io.js"></script>
  <script src="./client-socket.js"></script>
</body>

</html>
